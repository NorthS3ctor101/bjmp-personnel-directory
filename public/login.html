<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BJMP Personnel Directory</title>
  <link rel="icon" type="image/png" href="/img/prmisicon.ico" />
  <script src="/vendor/lucide.min.js"></script>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div id="loginModal">
  <div class="modal-card">
    <div class="modal-logo-wrap">
      <img src="/img/dprmlogo.png" alt="DPRM Logo" class="modal-logo" />
    </div>

    <h2 class="modal-title">BJMP Personnel Directory</h2>
    <p class="modal-subtitle">Enter the 6-digit code from your authenticator app.</p>

    <div class="timer-container">
      <div class="timer-text">Code expires in: <span id="totpTimer">30s</span></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width: 100%;"></div>
      </div>
    </div>

    <form id="loginForm">
      <div style="margin-bottom: 1rem;">
        <input type="text" id="totpCode" placeholder="000 000" maxlength="6" autocomplete="off">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Authenticate</button>
    </form>

    <div id="loginErrorMessage" style="display: none;"></div>

    <div class="modal-footer-info" style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem;">  
      <div class="footer-dev" style="display: flex; align-items: center; justify-content: center; gap: 0.25rem; opacity: 0.7;">
        <i data-lucide="terminal" class="icon-sm" style="color:var(--blue-600); width: 14px; height: 14px;"></i>
        <span>Developed by <span class="accent" style="font-weight: 600; color: #0066cc;">DPRM ICT DevTeam</span></span>
      </div> 
    </div>
    
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
